<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>Dash Diagnostics</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* Pass = green primary button. */
    .btn.pass {
      background: var(--success);
      color: #00231b;
      font-weight: 700;
      border-color: var(--success);
    }
  </style>
</head>
<body>

<div class="shell">
  <header class="app-header">
    <div class="logo">Dash · Diag</div>
    <a class="status-pill" href="/" style="text-decoration:none">exit</a>
  </header>

  <article class="card hero">
    <div class="step-dots" id="dots" aria-hidden="true"></div>
    <h2 id="step-title">Hardware diagnostic</h2>
    <p class="subtle" id="step-instruction">Walk through every peripheral one at a time.</p>
    <div id="step-status" class="subtle muted" style="min-height: 24px; margin-top: var(--s-3);">—</div>
    <div class="btn-row" style="margin-top: var(--s-4)">
      <button class="btn ghost" id="btn-skip">Skip</button>
      <button class="btn pass" id="btn-pass" hidden>Yes</button>
      <button class="btn danger" id="btn-fail" hidden>No</button>
    </div>
  </article>

  <article class="card">
    <h3>Results so far</h3>
    <div id="results" class="col">
      <span class="subtle">Nothing yet.</span>
    </div>
  </article>
</div>

<div id="toast" class="toast"></div>

<script>
const $ = (id) => document.getElementById(id);

const steps = [
  { id: "boot",   name: "Boot OK", auto: true,
    instruction: "Confirming Dash is reachable…" },
  { id: "imu",    name: "IMU readout", auto: true,
    instruction: "Reading orientation from the IMU…" },
  { id: "tap",    name: "Tap detection",
    instruction: "Tap Dash once. The cube should blink and chirp." },
  { id: "double", name: "Double-tap",
    instruction: "Double-tap Dash. Eyes should react." },
  { id: "shake",  name: "Shake detection",
    instruction: "Give Dash a firm side-to-side shake." },
  { id: "orient", name: "Orientation",
    instruction: "Rotate Dash so a different face is up." },
  { id: "touch",  name: "Cap touch",
    instruction: "Touch the cap-touch pad on the cube." },
  { id: "oled",   name: "OLED",
    instruction: "Are the eyes drawing correctly on the OLED?",
    manual: true },
  { id: "sound",  name: "Speaker",
    instruction: "Do you hear the test tone playing?",
    manual: true,
    repeat: true,                          // re-trigger /api/test-tone until answered
    repeatPath: "/api/test-tone",
    repeatEveryMs: 700 },
];

let cur = 0;
const results = {};
let repeatTimer = null;
let pollAbort = null;

function renderDots() {
  $("dots").innerHTML = "";
  for (let i = 0; i < steps.length; i++) {
    const d = document.createElement("span");
    if (i === cur) d.classList.add("on");
    if (results[steps[i].id] === "pass") d.style.background = "var(--success)";
    else if (results[steps[i].id] === "fail") d.style.background = "var(--danger)";
    $("dots").appendChild(d);
  }
}

async function api(path, opts = {}) {
  const r = await fetch(path, {
    headers: { "content-type": "application/json" }, ...opts,
  });
  if (!r.ok) throw new Error("HTTP " + r.status);
  const ct = r.headers.get("content-type") || "";
  return ct.includes("json") ? await r.json() : await r.text();
}

function clearRepeat() {
  if (repeatTimer) { clearInterval(repeatTimer); repeatTimer = null; }
}

function abortPoll() {
  if (pollAbort) { pollAbort.aborted = true; pollAbort = null; }
}

async function renderStep() {
  clearRepeat();
  abortPoll();
  const step = steps[cur];
  if (!step) {
    // Mark diag done so the main page can show "last run".
    localStorage.setItem("dash.lastDiag", String(Date.now()));
    $("step-title").textContent = "Diagnostic complete";
    $("step-instruction").textContent =
      "All steps complete. Tap exit to return.";
    $("btn-skip").hidden = true;
    $("btn-pass").hidden = true;
    $("btn-fail").hidden = true;
    renderDots();
    return;
  }
  $("step-title").textContent = `Step ${cur+1}/${steps.length} · ${step.name}`;
  $("step-instruction").textContent = step.instruction;
  $("step-status").textContent = "—";
  $("btn-skip").hidden = false;
  // Pass/Fail buttons only on manual steps; auto/polling steps don't need
  // them because the cube confirms its own input.
  $("btn-pass").hidden = !step.manual;
  $("btn-fail").hidden = !step.manual;
  renderDots();

  // Repeat-trigger (e.g. test-tone replays every 700ms until user answers).
  if (step.repeat && step.repeatPath) {
    api(step.repeatPath, { method: "POST" }).catch(() => {});
    repeatTimer = setInterval(() => {
      api(step.repeatPath, { method: "POST" }).catch(() => {});
    }, step.repeatEveryMs || 1000);
  }

  // Clear any stale last_event so we only match input that happens AFTER
  // this step actually started.
  try { await api("/api/diag-event", { method: "POST" }); } catch (e) {}

  if (step.auto) {
    autoRun(step);
  } else if (!step.manual) {
    pollStep(step);
  }
}

async function autoRun(step) {
  if (step.id === "boot") {
    try {
      const s = await api("/api/status");
      record("boot", s ? "pass" : "fail",
             `firmware ${s.firmware}, boot #${s.boot_count}`);
    } catch (e) {
      record("boot", "fail", "no response from device");
    }
    setTimeout(next, 1200);
  } else if (step.id === "imu") {
    try {
      const s = await api("/api/status");
      record("imu", "pass", `face=${s.face}`);
    } catch (e) {
      record("imu", "fail", String(e));
    }
    setTimeout(next, 1200);
  }
}

async function pollStep(step) {
  const token = { aborted: false };
  pollAbort = token;
  const deadline = Date.now() + 20000;
  while (Date.now() < deadline && !token.aborted) {
    try {
      const s = await api("/api/diag-event");
      if (matched(step, s)) {
        record(step.id, "pass", `saw "${s.last_event}"`);
        next();
        return;
      }
      $("step-status").textContent = `waiting for ${expected(step)}`;
    } catch (e) {}
    await sleep(250);
  }
  if (!token.aborted) {
    record(step.id, "fail", "timeout");
    next();
  }
}

function expected(step) {
  switch (step.id) {
    case "tap":    return "a tap on the cube";
    case "double": return "a double-tap";
    case "shake":  return "a shake";
    case "orient": return "an orientation change";
    case "touch":  return "a cap-touch";
  }
  return "input";
}

function matched(step, ev) {
  if (!ev || !ev.last_event) return false;
  const e = ev.last_event;
  switch (step.id) {
    case "tap":    return e === "Tap";
    case "double": return e === "DoubleTap";
    case "shake":  return e === "Shake";
    case "orient": return e === "OrientationChange";
    case "touch":  return e.startsWith("Touch");
  }
  return false;
}

function record(id, result, detail) {
  results[id] = result;
  const r = $("results");
  // First write — clear the "Nothing yet." placeholder.
  if (r.children.length === 1 && r.firstElementChild.classList.contains("subtle")) {
    r.innerHTML = "";
  }
  const row = document.createElement("div");
  row.className = "settings-row";
  const tone = result === "pass" ? "text-success" : "text-warn";
  const stepInfo = steps.find(s => s.id === id);
  row.innerHTML =
    `<div class="label">
       <span class="name">${stepInfo ? stepInfo.name : id}</span>
       ${detail ? `<span class="hint">${detail}</span>` : ""}
     </div>
     <span class="${tone}" style="font-weight:700">${result === "pass" ? "✓" : "✗"}</span>`;
  r.appendChild(row);
}

function next() { cur++; renderStep(); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

document.addEventListener("DOMContentLoaded", () => {
  $("btn-skip").addEventListener("click", () => {
    clearRepeat();
    record(steps[cur].id, "fail", "skipped");
    next();
  });
  $("btn-pass").addEventListener("click", () => {
    clearRepeat();
    record(steps[cur].id, "pass", "user confirmed");
    next();
  });
  $("btn-fail").addEventListener("click", () => {
    clearRepeat();
    record(steps[cur].id, "fail", "user denied");
    next();
  });
  renderStep();
});
</script>
</body>
</html>
