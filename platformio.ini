; Dash firmware — PlatformIO project configuration.
;
; Target: ESP32-WROOM 16MB flash. Single env `dash`, Arduino framework.
; Custom partition table (partitions.csv) with dual OTA slots, encrypted NVS,
; LittleFS data partition for sounds + web assets, and a coredump region.

[platformio]
default_envs = dash

[common]
firmware_version = 0.1.0

build_flags_base =
  -DFIRMWARE_VERSION=\"${common.firmware_version}\"
  -DCORE_DEBUG_LEVEL=3
  -DCONFIG_ESP_COREDUMP_ENABLE_TO_FLASH=1
  -DCONFIG_ESP_COREDUMP_DATA_FORMAT_ELF=1
  -DCONFIG_ESP_COREDUMP_CHECKSUM_CRC32=1

lib_deps_base =
  olikraus/U8g2 @ ^2.35.30
  bblanchon/ArduinoJson @ ^7.0.4

[env:dash]
platform = espressif32 @ ^6.7.0
board = esp32dev
framework = arduino

board_build.partitions = partitions.csv
board_build.filesystem = littlefs
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize

upload_speed = 460800

build_flags = ${common.build_flags_base}
lib_deps = ${common.lib_deps_base}

; Debug-friendly build for the overnight bring-up: keeps Serial logs, disables
; deep sleep gating so the USB monitor stays attached. Flip to `release` for
; production firmware that actually deep-sleeps.
[env:dash-debug]
extends = env:dash
build_flags =
  ${common.build_flags_base}
  -DDASH_DEBUG=1
  -DDASH_NO_DEEP_SLEEP=1
  -DDASH_SILENT_AUDIO=1

[env:dash-release]
extends = env:dash
build_flags =
  ${common.build_flags_base}
  -DDASH_RELEASE=1
